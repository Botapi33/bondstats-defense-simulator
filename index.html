<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BondStats Defense Simulator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Defense Bond Simulator</h1>
<p>Model how defense spending impacts bond markets</p>

<div class="grid">

<!-- INPUTS -->
<div class="panel">

<h2>Scenario Inputs</h2>

<label>Defense Spending ($bn)</label>
<input type="range" id="spending" min="0" max="400" value="120">
<span id="spendingVal">120</span>

<label>Issuance Structure</label>
<select id="maturity">
<option value="short">Short</option>
<option value="balanced">Balanced</option>
<option value="long">Long</option>
</select>

<label>Inflation</label>
<select id="inflation">
<option value="low">Low</option>
<option value="moderate">Moderate</option>
<option value="high">High</option>
</select>

<label>Central Bank</label>
<select id="cb">
<option value="dovish">Dovish</option>
<option value="neutral">Neutral</option>
<option value="hawkish">Hawkish</option>
</select>

<label>Safe Haven Demand</label>
<select id="safe">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<label>Fiscal Credibility</label>
<select id="fiscal">
<option value="strong">Strong</option>
<option value="weak">Weak</option>
</select>

<button onclick="run()">Run Simulation</button>

</div>

<!-- OUTPUT -->
<div class="panel">

<h2>Results</h2>

<div class="metric">
<b>Bond Stress Score</b>
<div class="bar"><div id="scoreBar"></div></div>
<p id="scoreVal">0</p>
</div>

<div class="metric"><b>Yield:</b> <span id="yield"></span></div>
<div class="metric"><b>Curve:</b> <span id="curve"></span></div>
<div class="metric"><b>Supply:</b> <span id="supply"></span></div>
<div class="metric"><b>Term Premium:</b> <span id="term"></span></div>
<div class="metric"><b>Volatility:</b> <span id="vol"></span></div>
<div class="metric"><b>Duration Risk:</b> <span id="dur"></span></div>

</div>

</div>

<div class="analysis" id="analysis"></div>

</div>

<script src="app.js"></script>
</body>
</html>
