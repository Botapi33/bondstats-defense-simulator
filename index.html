<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Defense Bond Simulator</title>

<style>

body {
    margin:0;
    font-family: Arial;
    background:#05080f;
    color:white;
}

.container {
    max-width:1400px;
    margin:auto;
    padding:40px;
}

h1 {
    font-size:48px;
    margin-bottom:10px;
}

p.sub {
    color:#aaa;
    margin-bottom:30px;
}

.grid {
    display:grid;
    grid-template-columns: 1.2fr 1fr;
    gap:30px;
}

.panel {
    background:#020617;
    padding:25px;
    border-radius:12px;
}

label {
    display:block;
    margin-top:18px;
}

input, select {
    width:100%;
    padding:12px;
    margin-top:6px;
    background:#111827;
    border:none;
    color:white;
}

button {
    margin-top:25px;
    width:100%;
    padding:15px;
    background:#f97316;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.metric {
    margin-top:18px;
}

.bar {
    width:100%;
    height:18px;
    background:#111;
    border-radius:10px;
    margin-top:6px;
}

.fill {
    height:100%;
    width:0%;
    border-radius:10px;
    background:linear-gradient(90deg,#22c55e,#f97316,#ef4444);
}

.analysis {
    margin-top:30px;
    background:#020617;
    padding:25px;
    border-radius:12px;
    line-height:1.7;
}

.drivers {
    margin-top:20px;
}

.drivers li {
    margin-bottom:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>Defense Bond Simulator</h1>
<p class="sub">A structured framework to model how defense spending affects bond markets</p>

<div class="grid">

<!-- INPUT -->
<div class="panel">

<h2>Scenario Inputs</h2>

<label>Defense Spending Increase ($bn)</label>
<input type="range" id="spending" min="0" max="400" value="120">
<span id="spVal">120</span>

<label>Issuance Structure</label>
<select id="maturity">
<option value="short">Short-end focused</option>
<option value="balanced">Balanced</option>
<option value="long">Long-end focused</option>
</select>

<label>Inflation Expectations</label>
<select id="inflation">
<option value="low">Low</option>
<option value="moderate">Moderate</option>
<option value="high">High</option>
</select>

<label>Monetary Policy</label>
<select id="cb">
<option value="dovish">Dovish</option>
<option value="neutral">Neutral</option>
<option value="hawkish">Hawkish</option>
</select>

<label>Safe Haven Demand</label>
<select id="safe">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<label>Fiscal Credibility</label>
<select id="fiscal">
<option value="strong">Strong</option>
<option value="weak">Weak</option>
</select>

<button onclick="run()">Run Simulation</button>

</div>

<!-- OUTPUT -->
<div class="panel">

<h2>Market Output</h2>

<div class="metric">
<b>Bond Stress Score</b>
<div class="bar"><div class="fill" id="scoreBar"></div></div>
<p id="scoreVal">0</p>
</div>

<div class="metric"><b>Yield Direction:</b> <span id="yield"></span></div>
<div class="metric"><b>Curve Impact:</b> <span id="curve"></span></div>
<div class="metric"><b>Supply Pressure:</b> <span id="supply"></span></div>
<div class="metric"><b>Term Premium:</b> <span id="term"></span></div>
<div class="metric"><b>Volatility:</b> <span id="vol"></span></div>
<div class="metric"><b>Duration Risk:</b> <span id="dur"></span></div>

</div>

</div>

<div class="analysis" id="analysis"></div>

<div class="analysis">
<h3>Key Drivers</h3>
<ul id="drivers"></ul>
</div>

</div>

<script>

let slider = document.getElementById("spending");
let spVal = document.getElementById("spVal");

slider.oninput = () => spVal.innerText = slider.value;

function run() {

    let s = parseInt(slider.value);
    let m = document.getElementById("maturity").value;
    let i = document.getElementById("inflation").value;
    let cb = document.getElementById("cb").value;
    let safe = document.getElementById("safe").value;
    let fiscal = document.getElementById("fiscal").value;

    let score = s * 0.4; // base weight
    let drivers = [];

    // Inflation
    if (i === "high") { score += 25; drivers.push("High inflation increases yield pressure"); }
    if (i === "moderate") { score += 12; drivers.push("Moderate inflation adds pressure"); }

    // Central Bank
    if (cb === "hawkish") { score += 15; drivers.push("Hawkish policy reinforces higher yields"); }
    if (cb === "dovish") { score -= 10; drivers.push("Dovish policy dampens yield increases"); }

    // Safe Haven
    if (safe === "high") { score -= 15; drivers.push("Strong demand offsets supply pressure"); }
    if (safe === "low") { score += 10; drivers.push("Weak demand increases market stress"); }

    // Fiscal
    if (fiscal === "weak") { score += 20; drivers.push("Weak fiscal credibility raises risk premium"); }

    score = Math.max(0, Math.min(score, 100));

    // OUTPUT LOGIC

    let yield = score > 70 ? "Strong upward pressure" :
                score > 40 ? "Moderate upward pressure" : "Neutral";

    let curve = m === "long" && score > 40 ? "Steepening" :
                m === "short" ? "Flattening" : "Neutral";

    let supply = score > 70 ? "High" :
                 score > 40 ? "Moderate" : "Low";

    let term = score > 60 ? "Increasing" : "Stable";

    let vol = score > 70 ? "High" :
              score > 40 ? "Moderate" : "Low";

    let dur = score > 60 ? "High sensitivity" :
              score > 30 ? "Moderate" : "Low";

    // RENDER

    document.getElementById("scoreBar").style.width = score + "%";
    document.getElementById("scoreVal").innerText = Math.round(score);

    document.getElementById("yield").innerText = yield;
    document.getElementById("curve").innerText = curve;
    document.getElementById("supply").innerText = supply;
    document.getElementById("term").innerText = term;
    document.getElementById("vol").innerText = vol;
    document.getElementById("dur").innerText = dur;

    // ANALYSIS TEXT (viel besser jetzt)

    document.getElementById("analysis").innerHTML = `
    A defense spending increase of $${s}bn leads to higher government borrowing and increased bond issuance.

    The market impact depends on how supply interacts with expectations.

    In this scenario, ${i} inflation and ${cb} monetary policy create a ${yield.toLowerCase()} environment.

    Issuance structure (${m}) influences curve dynamics, resulting in a ${curve.toLowerCase()} outcome.

    Overall, the bond market reflects a stress level of ${Math.round(score)}, driven by both supply pressure and macro expectations.
    `;

    // DRIVERS

    let dHTML = "";
    drivers.forEach(d => dHTML += "<li>" + d + "</li>");
    document.getElementById("drivers").innerHTML = dHTML;

}

</script>

</body>
</html>
