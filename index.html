<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BondStats – Defense Bond Simulator</title>

<style>

/* BASE */
body {
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #0b1020, #05080f);
    color:#e5e7eb;
}

/* LAYOUT */
.container {
    max-width:1400px;
    margin:auto;
    padding:40px;
}

h1 {
    font-size:52px;
    letter-spacing:-1px;
    margin-bottom:10px;
}

.sub {
    color:#9ca3af;
    margin-bottom:30px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: 1.2fr 1fr;
    gap:30px;
}

/* PANELS */
.panel {
    background:rgba(2,6,23,0.9);
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.05);
    padding:25px;
    border-radius:14px;
    transition:0.2s;
}

.panel:hover {
    transform: translateY(-2px);
}

/* INPUTS */
label {
    display:block;
    margin-top:18px;
    font-size:14px;
    color:#9ca3af;
}

input, select {
    width:100%;
    padding:12px;
    margin-top:6px;
    background:#111827;
    border:none;
    color:white;
    border-radius:6px;
}

/* BUTTON */
button {
    margin-top:25px;
    width:100%;
    padding:15px;
    background:#f97316;
    border:none;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    transition:0.2s;
}

button:hover {
    background:#fb923c;
}

/* METRICS */
.metric {
    margin-top:18px;
}

.bar {
    width:100%;
    height:18px;
    background:#111;
    border-radius:10px;
    margin-top:6px;
}

.fill {
    height:100%;
    width:0%;
    border-radius:10px;
    transition:0.5s;
}

/* TABS */
.tabs {
    display:flex;
    gap:10px;
    margin-top:30px;
}

.tab {
    padding:10px 15px;
    background:#111827;
    cursor:pointer;
    border-radius:6px;
}

.tab.active {
    background:#f97316;
}

/* CONTENT */
.content {
    margin-top:20px;
    background:#020617;
    padding:20px;
    border-radius:12px;
    line-height:1.6;
}

/* DRIVERS */
li {
    margin-bottom:6px;
}

</style>

</head>

<body>

<div class="container">

<h1>Defense Bond Simulator</h1>
<p class="sub">Structured framework for analyzing defense-driven bond market dynamics</p>

<div class="grid">

<!-- INPUT -->
<div class="panel">

<h2>Scenario Inputs</h2>

<label>Defense Spending ($bn)</label>
<input type="range" id="spending" min="0" max="400" value="120">
<span id="spVal">120</span>

<label>Issuance Structure</label>
<select id="maturity">
<option value="short">Short-end focused</option>
<option value="balanced">Balanced</option>
<option value="long">Long-end focused</option>
</select>

<label>Inflation Expectations</label>
<select id="inflation">
<option value="low">Low</option>
<option value="moderate">Moderate</option>
<option value="high">High</option>
</select>

<label>Monetary Policy</label>
<select id="cb">
<option value="dovish">Dovish</option>
<option value="neutral">Neutral</option>
<option value="hawkish">Hawkish</option>
</select>

<label>Safe Haven Demand</label>
<select id="safe">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<label>Fiscal Credibility</label>
<select id="fiscal">
<option value="strong">Strong</option>
<option value="weak">Weak</option>
</select>

<button onclick="run()">Run Simulation</button>

</div>

<!-- OUTPUT -->
<div class="panel">

<h2>Market Output</h2>

<div class="metric">
<b>Bond Stress Score</b>
<div class="bar"><div class="fill" id="scoreBar"></div></div>
<p id="scoreVal">0</p>
</div>

<div class="metric"><b>Yield Direction:</b> <span id="yield"></span></div>
<div class="metric"><b>Curve Impact:</b> <span id="curve"></span></div>
<div class="metric"><b>Supply Pressure:</b> <span id="supply"></span></div>
<div class="metric"><b>Term Premium:</b> <span id="term"></span></div>
<div class="metric"><b>Volatility:</b> <span id="vol"></span></div>
<div class="metric"><b>Duration Risk:</b> <span id="dur"></span></div>

</div>

</div>

<!-- TABS -->
<div class="tabs">
<div class="tab active" onclick="switchTab('analysis')">Analysis</div>
<div class="tab" onclick="switchTab('drivers')">Drivers</div>
</div>

<!-- CONTENT -->
<div id="analysis" class="content"></div>
<div id="drivers" class="content" style="display:none;"></div>

</div>

<script>

// SLIDER
let slider = document.getElementById("spending");
let spVal = document.getElementById("spVal");
slider.oninput = () => spVal.innerText = slider.value;

// TAB SWITCH
function switchTab(tab) {
    document.getElementById("analysis").style.display = tab === "analysis" ? "block" : "none";
    document.getElementById("drivers").style.display = tab === "drivers" ? "block" : "none";

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    event.target.classList.add("active");
}

// CORE
function run() {

    let s = +slider.value;
    let m = maturity.value;
    let i = inflation.value;
    let cbv = cb.value;
    let safev = safe.value;
    let fiscalv = fiscal.value;

    let score = s * 0.4;
    let drivers = [];

    if(i==="high"){score+=25;drivers.push("High inflation → upward yield pressure")}
    if(i==="moderate"){score+=12;drivers.push("Moderate inflation → moderate pressure")}

    if(cbv==="hawkish"){score+=15;drivers.push("Hawkish policy → reinforces yields")}
    if(cbv==="dovish"){score-=10;drivers.push("Dovish policy → dampens yields")}

    if(safev==="high"){score-=15;drivers.push("Safe-haven demand offsets supply")}
    if(safev==="low"){score+=10;drivers.push("Weak demand increases pressure")}

    if(fiscalv==="weak"){score+=20;drivers.push("Weak fiscal credibility → higher risk premium")}

    score=Math.max(0,Math.min(score,100));

    let regime = score<30?"Low Stress":score<60?"Moderate Stress":"High Stress";

    let bar = document.getElementById("scoreBar");
    bar.style.width=score+"%";
    bar.style.background=score<30?"#22c55e":score<60?"#f97316":"#ef4444";

    scoreVal.innerText=Math.round(score)+" ("+regime+")";

    yield.innerText=score>70?"Strong ↑":score>40?"Moderate ↑":"Neutral";
    curve.innerText=m==="long"&&score>40?"Steepening":m==="short"?"Flattening":"Neutral";
    supply.innerText=score>70?"High":score>40?"Moderate":"Low";
    term.innerText=score>60?"Increasing":"Stable";
    vol.innerText=score>70?"High":score>40?"Moderate":"Low";
    dur.innerText=score>60?"High sensitivity":score>30?"Moderate":"Low";

    analysis.innerHTML=`
    <strong>Market Interpretation</strong><br><br>
    A defense expansion of $${s}bn increases issuance and supply pressure.
    Combined with ${i} inflation and ${cbv} monetary policy, the market enters a <strong>${regime}</strong> environment.
    The curve is ${curve.innerText.toLowerCase()}, with ${yield.innerText.toLowerCase()}.
    `;

    let dHTML="<ul>";
    drivers.forEach(d=>dHTML+="<li>"+d+"</li>");
    dHTML+="</ul>";
    document.getElementById("drivers").innerHTML=dHTML;

}

</script>

</body>
</html>
