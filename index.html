
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BondStats Terminal</title>

<style>
body {
    background:#05080f;
    color:white;
    font-family:Arial;
    margin:0;
}

.container {
    max-width:1600px;
    margin:auto;
    padding:40px;
}

h1 {font-size:48px;}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.panel {
    background:#020617;
    padding:20px;
    border-radius:10px;
}

select, input {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#111827;
    color:white;
    border:none;
}

button {
    margin-top:20px;
    padding:15px;
    width:100%;
    background:#f97316;
    border:none;
    cursor:pointer;
}

.bar {
    height:20px;
    background:#111;
    border-radius:10px;
}

.fill {
    height:100%;
    width:0%;
    background:linear-gradient(90deg,green,orange,red);
}

.metric {margin-top:15px;}

.compare {
    margin-top:30px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.delta {
    margin-top:30px;
    background:#020617;
    padding:20px;
}

</style>

</head>
<body>

<div class="container">

<h1>Defense Bond Terminal</h1>

<div class="grid">

<!-- SCENARIO A -->
<div class="panel">

<h2>Scenario A</h2>

<input type="range" id="sA" min="0" max="400" value="120">

<select id="iA">
<option value="low">Low Inflation</option>
<option value="moderate">Moderate</option>
<option value="high">High</option>
</select>

<select id="mA">
<option value="short">Short</option>
<option value="balanced">Balanced</option>
<option value="long">Long</option>
</select>

</div>

<!-- SCENARIO B -->
<div class="panel">

<h2>Scenario B</h2>

<input type="range" id="sB" min="0" max="400" value="200">

<select id="iB">
<option value="low">Low Inflation</option>
<option value="moderate">Moderate</option>
<option value="high">High</option>
</select>

<select id="mB">
<option value="short">Short</option>
<option value="balanced">Balanced</option>
<option value="long">Long</option>
</select>

</div>

</div>

<button onclick="run()">Compare Scenarios</button>

<div class="compare">

<div class="panel">
<h3>Scenario A Output</h3>
<div class="bar"><div id="barA" class="fill"></div></div>
<p id="outA"></p>
</div>

<div class="panel">
<h3>Scenario B Output</h3>
<div class="bar"><div id="barB" class="fill"></div></div>
<p id="outB"></p>
</div>

</div>

<div class="delta" id="delta"></div>

</div>

<script>

function calc(s, i, m) {

    let score = s / 2;

    if (i === "high") score += 25;
    if (i === "moderate") score += 10;

    score = Math.min(score,100);

    let yield = score > 60 ? "Strong ↑" :
                score > 30 ? "Moderate ↑" : "Neutral";

    let curve = m === "long" ? "Steepening" :
                m === "short" ? "Flattening" : "Neutral";

    return {score, yield, curve};
}

function run() {

    let A = calc(
        parseInt(document.getElementById("sA").value),
        document.getElementById("iA").value,
        document.getElementById("mA").value
    );

    let B = calc(
        parseInt(document.getElementById("sB").value),
        document.getElementById("iB").value,
        document.getElementById("mB").value
    );

    document.getElementById("barA").style.width = A.score + "%";
    document.getElementById("barB").style.width = B.score + "%";

    document.getElementById("outA").innerText =
        A.yield + " | " + A.curve;

    document.getElementById("outB").innerText =
        B.yield + " | " + B.curve;

    let diff = B.score - A.score;

    document.getElementById("delta").innerHTML = `
    <h3>Delta Analysis</h3>
    Score Difference: ${diff}
    `;
}

</script>

</body>
</html>
